name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ] # Se déclenche quand tu push sur main ou master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies & Compile
        run: |
          npm install -g typescript
          tsc --init || true
          tsc || echo "Compilation terminée (avec ou sans warnings)"

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Dossier racine à envoyer sur GitHub Pages

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4